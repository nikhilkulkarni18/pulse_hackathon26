<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse v2 Header QA</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #09111d;
        color: #edf6ff;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      .results {
        display: grid;
        gap: 12px;
      }

      .result {
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(173, 223, 255, 0.16);
        background: rgba(12, 28, 46, 0.84);
      }

      .result h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .row {
        margin-top: 4px;
        font-size: 14px;
        color: #c7d8e8;
      }

      .row strong {
        color: #74e8ff;
      }

      iframe {
        width: 1px;
        height: 1px;
        opacity: 0;
        position: absolute;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <h1>Pulse v2 Header QA</h1>
    <div id="results" class="results"></div>

    <script>
      const STORAGE_KEY = "cult-pulse-demo-user-progress-v2";
      const APP_URL = "/02%20Mockup%20v2/index.html#pulse";

      const baseProfile = {
        name: "Nikhil",
        goal: "weight_loss",
        frequency: "4",
        startingPoint: "regular",
        trainingMode: "gx_only",
        splitPreference: "full_body",
      };

      const iso = (day) => `${day}T12:00:00.000Z`;
      const workout = (format, day) => ({ format, dateTime: iso(day) });

      const activeCycle = [
        workout("HRX Quads", "2026-04-05"),
        workout("Burn", "2026-04-07"),
        workout("HRX Core", "2026-04-08"),
        workout("Yoga", "2026-04-10"),
      ];

      const scenarios = [
        {
          id: "new-user",
          label: "New user, no workouts",
          referenceDay: "2026-04-10",
          workouts: [],
        },
        {
          id: "first-workout",
          label: "After first workout",
          referenceDay: "2026-04-10",
          workouts: [workout("HRX Quads", "2026-04-10")],
        },
        {
          id: "building",
          label: "Building momentum",
          referenceDay: "2026-04-10",
          workouts: [workout("HRX Quads", "2026-04-08"), workout("Burn", "2026-04-10")],
        },
        {
          id: "on-track",
          label: "Active and on track",
          referenceDay: "2026-04-10",
          workouts: activeCycle,
        },
        {
          id: "early-cooling",
          label: "4 days inactive after good week",
          referenceDay: "2026-04-14",
          workouts: activeCycle,
        },
        {
          id: "cooling",
          label: "6 days inactive after good week",
          referenceDay: "2026-04-16",
          workouts: activeCycle,
        },
        {
          id: "dropoff",
          label: "8 days inactive after good week",
          referenceDay: "2026-04-18",
          workouts: activeCycle,
        },
        {
          id: "restart",
          label: "12 days inactive after good week",
          referenceDay: "2026-04-22",
          workouts: activeCycle,
        },
        {
          id: "hard-dropoff",
          label: "14 days inactive after good week",
          referenceDay: "2026-04-24",
          workouts: activeCycle,
        },
        {
          id: "return",
          label: "Return workout after long gap",
          referenceDay: "2026-04-22",
          workouts: [...activeCycle, workout("HRX Quads", "2026-04-22")],
        },
      ];

      function buildProgress(scenario) {
        return {
          qa_user: {
            profile: { ...baseProfile },
            planCreated: true,
            goalStep: 0,
            workouts: scenario.workouts,
            referenceDate: iso(scenario.referenceDay),
            startDate: iso("2026-03-24"),
          },
        };
      }

      function waitFor(check, timeout = 4000) {
        return new Promise((resolve, reject) => {
          const startedAt = Date.now();

          function poll() {
            try {
              const value = check();
              if (value) {
                resolve(value);
                return;
              }
            } catch (error) {
              reject(error);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for scenario render."));
              return;
            }

            window.setTimeout(poll, 60);
          }

          poll();
        });
      }

      async function runScenario(scenario) {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(buildProgress(scenario)));

        const frame = document.createElement("iframe");
        frame.src = `${APP_URL}&scenario=${scenario.id}&ts=${Date.now()}`;
        document.body.appendChild(frame);

        await new Promise((resolve) => {
          frame.addEventListener("load", resolve, { once: true });
        });

        const frameDocument = frame.contentDocument;
        let step = "loaded";

        step = "waiting-for-user-button";
        const userButton = await waitFor(() => frameDocument.querySelector("#userOptions .control-option"));
        userButton.click();

        step = "waiting-for-render";
        await waitFor(() => {
          const headline = frameDocument.getElementById("pulseHeadline")?.textContent?.trim();
          const member = frameDocument.getElementById("memberName")?.textContent?.trim();
          return headline && member === "Nikhil";
        });

        await new Promise((resolve) => window.setTimeout(resolve, 120));

        const headline = frameDocument.getElementById("pulseHeadline")?.textContent?.trim() || "";
        const subtext = frameDocument.getElementById("pulseHeaderSubtext")?.textContent?.trim() || "";
        const pill = frameDocument.getElementById("pulseMomentumPill")?.textContent?.trim() || "";
        const cardClass = frameDocument.getElementById("pulseCardTop")?.className || "";
        const curoSrc = frameDocument.getElementById("pulseCuroVisual")?.getAttribute("src") || "";
        const load = frameDocument.getElementById("pulseLoadValue")?.textContent?.trim() || "";
        const loadBadge = frameDocument.getElementById("loadStatusBadge")?.textContent?.trim() || "";
        const loadNarrative = frameDocument.getElementById("weeklyLoadNarrative")?.textContent?.trim() || "";
        const adherenceTitle = frameDocument.getElementById("goalAdherenceTitle")?.textContent?.trim() || "";
        const adherence = frameDocument.getElementById("goalAdherenceText")?.textContent?.trim() || "";
        const action = frameDocument.getElementById("primaryAction")?.textContent?.trim() || "";
        const atRiskCount = frameDocument.querySelectorAll(".body-reference-overlay.is-at-risk").length;
        const activeCount = frameDocument.querySelectorAll(".body-reference-overlay.is-active").length;

        frame.remove();

        return {
          scenario: scenario.label,
          headline,
          subtext,
          pill,
          cardClass,
          curoSrc,
          load,
          loadBadge,
          loadNarrative,
          adherenceTitle,
          adherence,
          action,
          atRiskCount,
          activeCount,
        };
      }

      function renderResult(result) {
        const card = document.createElement("section");
        card.className = "result";
        card.innerHTML = `
          <h2>${result.scenario}</h2>
          <div class="row"><strong>Headline:</strong> ${result.headline}</div>
          <div class="row"><strong>Subtext:</strong> ${result.subtext}</div>
          <div class="row"><strong>Pill:</strong> ${result.pill}</div>
          <div class="row"><strong>Card:</strong> ${result.cardClass}</div>
          <div class="row"><strong>Curo:</strong> ${result.curoSrc}</div>
          <div class="row"><strong>Load:</strong> ${result.load}</div>
          <div class="row"><strong>Load badge:</strong> ${result.loadBadge}</div>
          <div class="row"><strong>Load narrative:</strong> ${result.loadNarrative}</div>
          <div class="row"><strong>Adherence title:</strong> ${result.adherenceTitle}</div>
          <div class="row"><strong>Adherence:</strong> ${result.adherence}</div>
          <div class="row"><strong>Action:</strong> ${result.action}</div>
          <div class="row"><strong>Body map:</strong> ${result.activeCount} active overlays, ${result.atRiskCount} at-risk overlays</div>
        `;
        document.getElementById("results").appendChild(card);
      }

      (async () => {
        for (const scenario of scenarios) {
          try {
            const result = await runScenario(scenario);
            renderResult(result);
          } catch (error) {
            const activeFrames = [...document.querySelectorAll("iframe")];
            const latestFrame = activeFrames[activeFrames.length - 1];
            const latestDocument = latestFrame?.contentDocument;
            renderResult({
              scenario: scenario.label,
              headline: `Error: ${error.message}`,
              subtext: `Member=${latestDocument?.getElementById("memberName")?.textContent?.trim() || "?"} | UserOptions=${latestDocument?.querySelectorAll("#userOptions .control-option")?.length || 0}`,
              pill: "",
              cardClass: latestDocument?.getElementById("pulseCardTop")?.className || "",
              curoSrc: latestDocument?.getElementById("pulseCuroVisual")?.getAttribute("src") || "",
              load: "",
              loadBadge: "",
              loadNarrative: "",
              adherenceTitle: "",
              adherence: "",
              action: "",
              atRiskCount: 0,
              activeCount: 0,
            });
          }
        }
      })();
    </script>
  </body>
</html>
